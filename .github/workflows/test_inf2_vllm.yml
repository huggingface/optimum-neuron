name: Optimum neuron / Test INF2 vLLM

on:
  push:
    branches: [ main ]
    paths:
      - 'pyproject.toml'
      - 'optimum/commands/neuron/serve.py'
      - 'optimum/exporters/neuron/__main__.py'
      - 'optimum/neuron/configuration_utils.py'
      - 'optimum/neuron/modeling_base.py'
      - 'optimum/neuron/models/*.py'
      - 'optimum/neuron/models/inference/auto_models.py'
      - 'optimum/neuron/models/inference/modeling_utils.py'
      - 'optimum/neuron/models/inference/backend/**.py'
      - 'optimum/neuron/models/inference/gemma3/**.py'
      - 'optimum/neuron/models/inference/granite/**.py'
      - 'optimum/neuron/models/inference/llama/**.py'
      - 'optimum/neuron/models/inference/llama4/**.py'
      - 'optimum/neuron/models/inference/mixtral/**.py'
      - 'optimum/neuron/models/inference/phi3/**.py'
      - 'optimum/neuron/models/inference/qwen2/**.py'
      - 'optimum/neuron/models/inference/qwen3/**.py'
      - 'optimum/neuron/models/inference/qwen3_moe/**.py'
      - 'optimum/neuron/models/inference/smollm3/**.py'
      - 'optimum/neuron/models/inference/smolvlm/**.py'
      - 'optimum/neuron/vllm/**.py'
      - 'optimum/neuron/utils/**.py'
      - 'optimum/neuron/version.py'
      - 'tests/fixtures/llm/**.py'
      - 'tests/vllm/**.py'
      - 'docker/vllm/Dockerfile'
      - '.github/workflows/test_inf2_vllm.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'pyproject.toml'
      - 'optimum/commands/neuron/serve.py'
      - 'optimum/exporters/neuron/__main__.py'
      - 'optimum/neuron/configuration_utils.py'
      - 'optimum/neuron/modeling_base.py'
      - 'optimum/neuron/models/*.py'
      - 'optimum/neuron/models/inference/auto_models.py'
      - 'optimum/neuron/models/inference/modeling_utils.py'
      - 'optimum/neuron/models/inference/backend/**.py'
      - 'optimum/neuron/models/inference/gemma3/**.py'
      - 'optimum/neuron/models/inference/granite/**.py'
      - 'optimum/neuron/models/inference/llama/**.py'
      - 'optimum/neuron/models/inference/llama4/**.py'
      - 'optimum/neuron/models/inference/mixtral/**.py'
      - 'optimum/neuron/models/inference/phi3/**.py'
      - 'optimum/neuron/models/inference/qwen2/**.py'
      - 'optimum/neuron/models/inference/qwen3/**.py'
      - 'optimum/neuron/models/inference/qwen3_moe/**.py'
      - 'optimum/neuron/models/inference/smollm3/**.py'
      - 'optimum/neuron/models/inference/smolvlm/**.py'
      - 'optimum/neuron/vllm/**.py'
      - 'optimum/neuron/utils/**.py'
      - 'optimum/neuron/version.py'
      - 'tests/fixtures/llm/**.py'
      - 'tests/vllm/**.py'
      - 'docker/vllm/Dockerfile'
      - '.github/workflows/test_inf2_vllm.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run sanity check
        uses: ./.github/actions/sanity-check
        with:
          hf_token: ${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CACHE }}

  vllm-export-models:
    name: Export vLLM test models
    needs: sanity
    runs-on:
      group: aws-inf2-8xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Export test models
        uses: ./.github/actions/export_test_models
        with:
          hf_token: ${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CI }}
          vllm: 'true'

  vllm-engine-tests:
    name: Run vLLM engine tests
    needs: vllm-export-models
    runs-on:
      group: aws-inf2-8xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Neuronx runtime
        uses: ./.github/actions/install_neuronx_runtime
      - name: Setup virtual environment
        uses: ./.github/actions/setup_venv
      - name: Install vLLM and test prerequisites
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          uv pip install .[vllm,vllm-tests]
      - name: Run vLLM engine embedding tests
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          export HF_TOKEN=${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CI }}
          pytest -sv tests/vllm/engine/test_vllm_engine_embedding.py
      - name: Run vLLM engine generation tests
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          export HF_TOKEN=${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CI }}
          pytest -sv tests/vllm/engine/test_vllm_engine_generate.py
          pytest -sv tests/vllm/engine/test_vllm_engine_chunked_prefill.py

  vllm-service-tests:
    name: Run vLLM service tests
    needs: vllm-export-models
    runs-on:
      group: aws-inf2-8xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Neuronx runtime
        uses: ./.github/actions/install_neuronx_runtime
      - name: Setup virtual environment
        uses: ./.github/actions/setup_venv
      - name: Install vLLM and test prerequisites
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          uv pip install .[vllm,vllm-tests]
      - name: Run vLLM service tests
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          export HF_TOKEN=${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CI }}
          pytest -sv tests/vllm/service

  vllm-docker-tests:
    name: Run vLLM docker tests
    needs: vllm-export-models
    runs-on:
      group: aws-inf2-8xlarge
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Neuronx runtime
        uses: ./.github/actions/install_neuronx_runtime
      - name: Setup virtual environment
        uses: ./.github/actions/setup_venv
      - name: Install vLLM and test prerequisites
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          uv pip install .[vllm,vllm-tests]
      - name: Build docker image
        run: |
          sudo apt-get install -y gawk
          make optimum-neuron-vllm
      - name: Run vLLM docker tests
        run: |
          source aws_neuron_venv_pytorch/bin/activate
          export HF_TOKEN=${{ secrets.HF_TOKEN_OPTIMUM_NEURON_CI }}
          pytest -sv tests/vllm/docker
